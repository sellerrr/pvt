<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Access</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: linear-gradient(135deg, #020617, #1e0033, #3b0000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  max-width: 420px;
  width: 100%;
  padding: 30px 22px;
  text-align: center;
}

/* BADGE */
.badge {
  font-size: 11px;
  letter-spacing: 1px;
  color: #ff4d6d;
  margin-bottom: 12px;
  opacity: 0.8;
}

/* TITLE */
h1 {
  font-size: 30px;
  font-weight: 800;
  margin: 0;
  line-height: 1.2;
}

/* SUBTEXT */
.subtitle {
  font-size: 15px;
  opacity: 0.75;
  margin-top: 12px;
  line-height: 1.5;
}

/* BUTTON */
.btn {
  display: block;
  margin-top: 32px;
  padding: 18px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 700;
  font-size: 16px;
  background: linear-gradient(45deg, #ff4d6d, #ff006e);
  color: white;
  box-shadow: 0 0 25px rgba(255, 0, 110, 0.6);
  transition: all 0.2s ease;
}

.btn:hover {
  transform: scale(1.06);
  box-shadow: 0 0 35px rgba(255, 0, 110, 0.9);
}

/* NOTE */
.note {
  margin-top: 22px;
  font-size: 14px;
  opacity: 0.75;
  line-height: 1.5;
}

.highlight {
  font-weight: 700;
  color: #ff4d6d;
}

/* FOOTER */
.footer {
  margin-top: 40px;
  font-size: 12px;
  opacity: 0.5;
  line-height: 1.4;
}

.footer span {
  display: block;
  margin-top: 5px;
  font-size: 11px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

  <div class="badge">🔞 18+ ONLY</div>

  <h1>
    Private Access 👀
  </h1>

  <div class="subtitle">
    Not everything can be posted publicly...<br>
    <span class="highlight">you already know why 😏</span>
  </div>

  <!-- 🔗 EDIT YOUR TELEGRAM USER -->
  <a href="https://t.me/Levi_buy?text=I%20want%20to%20buy,%20show%20me%20menu" class="btn">
    👉 View Full Menu
  </a>

  <div class="note">
    Send a message asking for the menu 😉<br>
    <span class="highlight">exclusive folders available 📂🔥</span>
  </div>

  <div class="footer">
    Only serious buyers message.<br>
    <span>If you know, you know.</span>
  </div>

</div>

</body>
</html>
